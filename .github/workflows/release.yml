name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build macOS arm64 binary
        run: bun build source/cli.tsx --compile --target=bun-darwin-arm64 --outfile synctx-macos-arm64

      - name: Build macOS x64 binary
        run: bun build source/cli.tsx --compile --target=bun-darwin-x64 --outfile synctx-macos-x64

      - name: Archive binaries
        run: |
          tar -czf synctx-macos-arm64.tar.gz synctx-macos-arm64
          tar -czf synctx-macos-x64.tar.gz synctx-macos-x64

      - name: Build for npm
        run: bun run build

      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            synctx-macos-arm64.tar.gz
            synctx-macos-x64.tar.gz
